apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: bonass-soccer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: bonass-soccer-frontend:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: NEXT_PUBLIC_API_URL
              value: "http://backend:8000"
          ports:
            - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: bonass-soccer
spec:
  selector:
    app: frontend
  ports:
    - port: 3000
      targetPort: 3000
