apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: bonass-soccer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: bonass-soccer-backend:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: database-url
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: secret-key
            - name: CELERY_BROKER_URL
              value: redis://redis:6379/0
            - name: ALLOWED_HOSTS
              value: "*"
            - name: CORS_ALLOWED_ORIGINS
              value: "http://localhost:3000"
            - name: EMAIL_BACKEND
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: email-backend
            - name: EMAIL_HOST
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: email-host
            - name: EMAIL_PORT
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: email-port
            - name: EMAIL_USE_TLS
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: email-use-tls
            - name: EMAIL_HOST_USER
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: email-host-user
            - name: EMAIL_HOST_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: email-host-password
            - name: DEFAULT_FROM_EMAIL
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: default-from-email
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /api/docs/
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: bonass-soccer
spec:
  selector:
    app: backend
  ports:
    - port: 8000
      targetPort: 8000
---
# Create secret: kubectl create secret generic backend-secret -n bonass-soccer --from-literal=secret-key=xxx --from-literal=database-url=postgres://... --from-literal=email-backend=django.core.mail.backends.smtp.EmailBackend --from-literal=email-host=smtp.gmail.com --from-literal=email-port=587 --from-literal=email-use-tls=true --from-literal=email-host-user=your-email@gmail.com --from-literal=email-host-password=your-app-password --from-literal=default-from-email=your-email@gmail.com
