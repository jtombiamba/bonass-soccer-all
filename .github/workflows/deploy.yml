# Deploy on push to main and tags: build and push images to GitHub Container Registry
name: Deploy

on:
  push:
    branches: [main]
    tags: ['v*', 'release-*']

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    # Only run for main branch or tags (already filtered by on, but keep for safety)
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: read
      packages: write
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME_BACKEND: ${{ github.repository }}/backend
      IMAGE_NAME_FRONTEND: ${{ github.repository }}/frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine tags
        id: tags
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          # Initialize tag lists
          BACKEND_TAGS=""
          FRONTEND_TAGS=""
          if [[ ${{ github.ref }} == refs/tags/* ]]; then
            TAG_NAME=${GITHUB_REF#refs/tags/}
            BACKEND_TAGS="${{ env.REGISTRY }}/${{ env.IMAGE_NAME_BACKEND }}:$TAG_NAME"
            FRONTEND_TAGS="${{ env.REGISTRY }}/${{ env.IMAGE_NAME_FRONTEND }}:$TAG_NAME"
            # Also tag with sha for reproducibility
            BACKEND_TAGS="$BACKEND_TAGS,${{ env.REGISTRY }}/${{ env.IMAGE_NAME_BACKEND }}:sha-$SHORT_SHA"
            FRONTEND_TAGS="$FRONTEND_TAGS,${{ env.REGISTRY }}/${{ env.IMAGE_NAME_FRONTEND }}:sha-$SHORT_SHA"
          else
            # main branch
            BACKEND_TAGS="${{ env.REGISTRY }}/${{ env.IMAGE_NAME_BACKEND }}:latest,${{ env.REGISTRY }}/${{ env.IMAGE_NAME_BACKEND }}:sha-$SHORT_SHA"
            FRONTEND_TAGS="${{ env.REGISTRY }}/${{ env.IMAGE_NAME_FRONTEND }}:latest,${{ env.REGISTRY }}/${{ env.IMAGE_NAME_FRONTEND }}:sha-$SHORT_SHA"
          fi
          # Convert comma-separated to newline-separated (for output)
          echo "backend_tags<<EOF" >> $GITHUB_OUTPUT
          echo "$BACKEND_TAGS" | tr ',' '\n' >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "frontend_tags<<EOF" >> $GITHUB_OUTPUT
          echo "$FRONTEND_TAGS" | tr ',' '\n' >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.backend_tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.frontend_tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
