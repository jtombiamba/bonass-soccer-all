# Deploy on push to main (build and push images; optional K8s/Coolify)
name: Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: bonass-soccer-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          tags: bonass-soccer-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
    # Add steps to push to registry (e.g. ghcr.io, Docker Hub) and deploy to K8s/Coolify when credentials are configured
